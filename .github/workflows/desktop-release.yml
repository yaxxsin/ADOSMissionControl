name: Desktop Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build

      - name: Compile Electron
        run: npm run electron:compile

      - name: Build macOS app
        run: npx electron-builder --mac --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: release/*.dmg

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build

      - name: Compile Electron
        run: npm run electron:compile

      - name: Build Windows app
        run: npx electron-builder --win --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: release/*.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build

      - name: Compile Electron
        run: npm run electron:compile

      - name: Build Linux app
        run: npx electron-builder --linux --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: release/*.AppImage

  update-release-notes:
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Update release notes
        uses: actions/github-script@v7
        with:
          script: |
            const tag = context.ref.replace('refs/tags/', '');
            const { data: releases } = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            const release = releases.find(r => r.tag_name === tag);
            if (!release) {
              core.setFailed(`Release for tag ${tag} not found`);
              return;
            }
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: release.id,
              draft: false,
              body: [
                `## Altnautica Command ${tag}`,
                '',
                '### What\'s New',
                '',
                '- **Internationalization** with 7 languages (English, Hindi, Tamil, Chinese, German, Spanish, French) and a built-in translation editor',
                '- **Cloud relay** for remote drone control over 4G/5G. MQTT telemetry, HTTP command relay, and live video streaming through Cloudflare Tunnel',
                '- **Standalone Convex backend** so open-source users can self-host cloud features without depending on our deployment',
                '- **Drawing tools upgrade** with quick rectangle for fast survey areas, backspace vertex deletion, SAR search patterns, and auto-open pattern config after drawing',
                '- **MSP protocol modules** split into categorized decoder files for better maintainability',
                '- **Agent store overhaul** splitting the monolithic store into connection, system, scripts, and peripherals stores with a facade for backward compatibility',
                '- **Cloud mode for all Command tabs** including peripherals, scripts, suites, enrollment, peers, and logs',
                '',
                '### Performance',
                '',
                '- Cesium 3D globe rendering with entity caching and scene optimizations',
                '- Map icon caching and batched tile updates',
                '- Batched Zustand version updates for high-frequency telemetry',
                '- Conditional hex logging in diagnostics to cut CPU overhead',
                '- Next.js Turbopack enabled for faster dev builds',
                '',
                '### Bug Fixes',
                '',
                '- Zustand store mutation and subscription ordering issues',
                '- MQTT module import failing in production bundles',
                '- Demo mode not syncing with environment variable in settings',
                '- Cloud status timeout and duplicate drone records',
                '- Type safety fixes across agent API response handling',
                '- Convex skip guard applied consistently via `useConvexSkipQuery` hook',
                '',
                '### Downloads',
                '',
                '- **macOS:** `.dmg` (Intel and Apple Silicon)',
                '- **Windows:** `.exe` installer',
                '- **Linux:** `.AppImage`',
                '',
                '> Desktop builds lag behind the web version by a release or two.',
                '> For the latest, use [command.altnautica.com](https://command.altnautica.com)',
                '> or clone the repo and run locally (`npm ci && npm run dev`).',
              ].join('\n'),
            });
